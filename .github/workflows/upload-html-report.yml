name: Maven Build & Test Reports

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:
    inputs:
      service:
        description: Service directory path relative to repository root
        required: false
        default: '.'
      publish_reports:
        description: Publish generated reports and deploy to gh-pages
        required: false
        default: 'false'
      from_branch:
        description: Optional branch name to use in report paths
        required: false
      report_root:
        description: Local report root directory
        required: false
        default: 'reports'

permissions:
  contents: read
  checks: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode clean test

      - name: Prepare report folders
        id: prepare-reports  
        if: ${{ inputs.publish_reports == 'true' }}
        shell: bash
        run: |
          SAFE_BRANCH="$(echo "${FROM_BRANCH:-unknown}" | sed 's#[^a-zA-Z0-9._-]#-#g')"
          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> "$GITHUB_ENV"

          REPORT_PATH="${REPORT_ROOT}/${SAFE_BRANCH}/${GITHUB_RUN_NUMBER}"
          LATEST_PATH="${REPORT_ROOT}/${SAFE_BRANCH}/latest"

          echo "REPORT_PATH=${REPORT_PATH}" >> "$GITHUB_ENV"
          echo "LATEST_PATH=${LATEST_PATH}" >> "$GITHUB_ENV"

          echo "SAFE_BRANCH=${SAFE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "REPORT_PATH=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
          echo "LATEST_PATH=${LATEST_PATH}" >> "$GITHUB_OUTPUT"

          mkdir -p "${REPORT_PATH}"
          mkdir -p "${LATEST_PATH}"
        env:
          FROM_BRANCH: ${{ inputs.from_branch || github.ref_name || github.event.pull_request.base.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          REPORT_ROOT: ${{ github.workspace }}/${{ inputs.report_root }}

      - name: Generate Cucumber HTML report
        if: ${{ inputs.publish_reports == 'true' && hashFiles(format('{0}/target/cucumber.json', inputs.service)) != '' }}
        run: |
          mkdir -p "${REPORT_PATH}/cucumber"
          npm install -g multiple-cucumber-html-reporter

          npx multiple-cucumber-html-reporter \
            --jsonDir "${SERVICE}/target" \
            --reportPath "${REPORT_PATH}/cucumber" \
            --reportName "strategic-brief-${FROM_BRANCH}" \
            --pageTitle "strategic-brief-${FROM_BRANCH}" \
            --metadataName "Branch" \
            --metadataValue "${FROM_BRANCH}"
        env:
          SERVICE: ${{ inputs.service || '.' }}
          FROM_BRANCH: ${{ inputs.from_branch || github.ref_name || github.event.pull_request.base.ref }}
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}
      - name: Copy JUnit reports
        if: ${{ inputs.publish_reports == 'true' }}
        run: |
          mkdir -p "${REPORT_PATH}/junit"
          if compgen -G "${SERVICE}/target/surefire-reports/*.xml" > /dev/null; then
            cp "${SERVICE}"/target/surefire-reports/*.xml "${REPORT_PATH}/junit/"
          fi
        env:
          SERVICE: ${{ inputs.service || '.' }}
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}

      # - name: Publish JUnit test results to GitHub Checks
      #   if: ${{ inputs.publish_reports == true }}
      #   uses: dorny/test-reporter@v1
      #   with:
      #     name: JUnit Test Results
      #     path: ${{ inputs.service }}/target/surefire-reports/*.xml
      #     reporter: java-junit
      #     fail-on-error: false

      - name: Copy JaCoCo UT report
        if: ${{ inputs.publish_reports == 'true' && hashFiles(format('{0}/target/site/jacoco/ut/index.html', inputs.service)) != '' }}
        run: |
          if [ -d "${SERVICE}/target/site/jacoco/ut" ]; then
            mkdir -p "${REPORT_PATH}/jacoco-ut"
            cp -R "${SERVICE}/target/site/jacoco/ut/." "${REPORT_PATH}/jacoco-ut/"
          fi
        env:
          SERVICE: ${{ inputs.service || '.' }}
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}

      - name: Copy JaCoCo IT report
        if: ${{ inputs.publish_reports == 'true' && hashFiles(format('{0}/target/site/jacoco/it/index.html', inputs.service)) != '' }}
        run: |
          if [ -d "${SERVICE}/target/site/jacoco/it" ]; then
            mkdir -p "${REPORT_PATH}/jacoco-it"
            cp -R "${SERVICE}/target/site/jacoco/it/." "${REPORT_PATH}/jacoco-it/"
          fi
        env:
          SERVICE: ${{ inputs.service || '.' }}
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}

      - name: Copy JaCoCo merged report
        if: ${{ inputs.publish_reports == 'true' }}
        run: |
          if [ -d "${SERVICE}/target/site/jacoco" ]; then
            mkdir -p "${REPORT_PATH}/jacoco-merged"
            cp -R "${SERVICE}/target/site/jacoco/." "${REPORT_PATH}/jacoco-merged/"
          fi
        env:
          SERVICE: ${{ inputs.service || '.' }}
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}

      - name: Copy latest report
        if: ${{ inputs.publish_reports == 'true' }}
        run: |
          rm -rf "${LATEST_PATH}"
          mkdir -p "${LATEST_PATH}"
          cp -R "${REPORT_PATH}/." "${LATEST_PATH}/"
        env:
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}
          LATEST_PATH: ${{ steps.prepare-reports.outputs.LATEST_PATH }}

      - name: Create report index
        if: ${{ inputs.publish_reports == 'true' }}
        run: |
          cat > "${REPORT_PATH}/index.html" <<EOF
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Build Reports - ${SERVICE} - ${FROM_BRANCH}</title>
          </head>
          <body>
            <h1>Build Reports</h1>
            <p><strong>Service:</strong> ${SERVICE}</p>
            <p><strong>Branch:</strong> ${FROM_BRANCH}</p>
            <p><strong>Run:</strong> ${GITHUB_RUN_NUMBER}</p>

            <h2>Reports</h2>
            <ul>
              <li><a href="./cucumber/index.html">Cucumber Report</a></li>
              <li><a href="./junit/">JUnit XML Reports</a></li>
              <li><a href="./jacoco-ut/index.html">JaCoCo Unit Test Coverage Report</a></li>
              <li><a href="./jacoco-it/index.html">JaCoCo IT Coverage Report</a></li>
              <li><a href="./jacoco-merged/index.html">JaCoCo Merged Coverage Report</a></li>
            </ul>
          </body>
          </html>
          EOF

          cp "${REPORT_PATH}/index.html" "${LATEST_PATH}/index.html"
        env:
          SERVICE: ${{ inputs.service || '.' }}
          FROM_BRANCH: ${{ inputs.from_branch || github.ref_name || github.event.pull_request.base.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}
          LATEST_PATH: ${{ steps.prepare-reports.outputs.LATEST_PATH }}

      # - name: Add report summary
      #   if: ${{ inputs.publish_reports == true }}
      #   run: |
      #     PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${SAFE_BRANCH}/${GITHUB_RUN_NUMBER}/"
      #     LATEST_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${SAFE_BRANCH}/latest/"

      #     {
      #       echo "## Published Reports"
      #       echo ""
      #       echo "| Report | Link |"
      #       echo "|---|---|"
      #       echo "| Current run | ${PAGES_URL} |"
      #       echo "| Latest for branch | ${LATEST_URL} |"
      #       echo "| Cucumber | ${PAGES_URL}cucumber/ |"
      #       echo "| JUnit XML | ${PAGES_URL}junit/ |"
      #       echo "| JaCoCo UT | ${PAGES_URL}jacoco-ut/ |"
      #       echo "| JaCoCo IT | ${PAGES_URL}jacoco-it/ |"
      #       echo "| JaCoCo merged | ${PAGES_URL}jacoco-merged/ |"
      #     } >> "$GITHUB_STEP_SUMMARY"
      - name: Set Git Identity
        if: inputs.publish_reports == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish reports to gh-pages branch
        if: inputs.publish_reports == 'true' && github.event_name != 'pull_request'
        run: |
          TEMP_DIR=$(mktemp -d)
          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add "${TEMP_DIR}" origin/gh-pages
          else
            git worktree add --detach "${TEMP_DIR}"
            cd "${TEMP_DIR}"
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd -
          fi

          rm -rf "${TEMP_DIR}/reports/${SAFE_BRANCH}/${GITHUB_RUN_NUMBER}"
          rm -rf "${TEMP_DIR}/reports/${SAFE_BRANCH}/latest"

          mkdir -p "${TEMP_DIR}/reports/${SAFE_BRANCH}/${GITHUB_RUN_NUMBER}"
          mkdir -p "${TEMP_DIR}/reports/${SAFE_BRANCH}/latest"

          cp -R "${REPORT_PATH}/." "${TEMP_DIR}/reports/${SAFE_BRANCH}/${GITHUB_RUN_NUMBER}/"
          cp -R "${LATEST_PATH}/." "${TEMP_DIR}/reports/${SAFE_BRANCH}/latest/"

          cd "${TEMP_DIR}"

          cat > index.html <<EOF
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Repository Reports</title>
          </head>
          <body>
            <h1>Repository Reports</h1>
            <p>Reports are published under <code>/reports/&lt;branch&gt;/&lt;run-number&gt;/</code>.</p>
          </body>
          </html>
          EOF

          git add .
          git commit -m "Publish reports for ${SERVICE} ${FROM_BRANCH} run ${GITHUB_RUN_NUMBER}" || exit 0
          echo "ls temp dir: $(ls -l ${TEMP_DIR})"
          echo "ls root dir: $(ls)"
          # git push origin HEAD:gh-pages
        env:
          SERVICE: ${{ inputs.service || '.' }}
          FROM_BRANCH: ${{ inputs.from_branch || github.ref_name || github.event.pull_request.base.ref }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          SAFE_BRANCH: ${{ steps.prepare-reports.outputs.SAFE_BRANCH }}
          REPORT_PATH: ${{ steps.prepare-reports.outputs.REPORT_PATH }}
          LATEST_PATH: ${{ steps.prepare-reports.outputs.LATEST_PATH }}