name: Upload HTML site report

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  upload-report:
    name: Upload HTML report
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload HTML site as report
        uses: actions/upload-pages-artifact@v3
        with:
          path: './github-pages'

      - name: Deploy HTML site report
        id: deployment
        uses: actions/deploy-pages@v5