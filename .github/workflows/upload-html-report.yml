name: Upload HTML site report

on:
  push:
    branches:
      - gh-pages
      - master
  workflow_dispatch:

jobs:
  upload-report:
    name: Upload HTML report
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload HTML site as report
        uses: actions/upload-artifact@v4
        with:
          name: html-site-report
          path: |
            github-pages/**/*.html
          if-no-files-found: error
