name: Upload HTML site report

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  upload-report:
    name: Upload HTML report
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode test

      - name: Generate Surefire HTML report
        run: mvn --batch-mode org.apache.maven.plugins:maven-surefire-report-plugin:3.5.2:report-only

      - name: Prepare JaCoCo reporter output directory
        run: mkdir -p _TMP

      - name: Publish JaCoCo summary
        uses: PavanMudigonda/jacoco-reporter@v5.2
        with:
          coverage_results_path: target/site/jacoco/jacoco.xml
          coverage_report_name: JaCoCo Coverage Report
          coverage_report_title: JaCoCo Coverage Report
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_check_run: false

      - name: Copy test reports into site
        run: |
          mkdir -p github-pages/surefire-reports/xml github-pages/jacoco github-pages/cucumber
          cp -r target/reports/. github-pages/surefire-reports/
          cp target/reports/surefire.html github-pages/surefire-reports/index.html
          cp target/surefire-reports/*.xml github-pages/surefire-reports/xml/
          cp -r target/site/jacoco/. github-pages/jacoco/
          cp -r target/cucumber-reports/. github-pages/cucumber/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload HTML site as report
        uses: actions/upload-pages-artifact@v3
        with:
          path: './github-pages'

      - name: Deploy HTML site report
        id: deployment
        uses: actions/deploy-pages@v5

