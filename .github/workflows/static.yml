# Simple workflow for building the Java app and deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode test

      - name: Copy JUnit reports into site
        run: |
          mkdir -p github-pages/surefire-reports
          cp target/surefire-reports/*.xml github-pages/surefire-reports/
          {
            echo '<!doctype html>'
            echo '<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">'
            echo '<title>JUnit Surefire Reports</title></head><body>'
            echo '<h1>JUnit Surefire Reports</h1><ul>'
            for file in github-pages/surefire-reports/*.xml; do
              name="$(basename "$file")"
              echo "<li><a href=\"./$name\">$name</a></li>"
            done
            echo '</ul><p><a href="../">Back to site</a></p></body></html>'
          } > github-pages/surefire-reports/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './github-pages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5