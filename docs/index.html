<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Pages Site</title>
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
        color: #172033;
        background: #eef3f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        padding: 44px;
        border: 1px solid #ccd8e5;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(23, 32, 51, 0.1);
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2rem, 6vw, 3.75rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: #516073;
        font-size: 1.1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Published with GitHub Pages</h1>
      <p>This page lives in the DOCS directory and is ready to publish.</p>
    </main>
  </body>
</html>
