<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My GitHub Page</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        color: #1f2937;
        background: #f6f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        padding: 48px;
        border: 1px solid #d7dce5;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(31, 41, 55, 0.08);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0;
        max-width: 56ch;
        color: #4b5563;
        font-size: 1.1rem;
        line-height: 1.6;
      }

      a {
        color: #0f766e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, GitHub Pages.</h1>
      <p>
        This simple page is published from the <a href="https://github.com/mendeboz/mapages">mapages</a>
        repository. ROOT
      </p>
    </main>
  </body>
</html>
